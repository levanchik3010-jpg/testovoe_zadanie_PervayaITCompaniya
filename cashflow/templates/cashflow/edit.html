<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Редактирование записи</title>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="col-md-6 offset-md-3">
        <div class="card shadow-sm">
            <div class="card-header bg-white fw-semibold">
                Редактирование записи #{{ record.id }}
            </div>
            <div class="card-body">

                {% if messages %}
                {% for msg in messages %}
                <div class="alert alert-danger py-2">{{ msg }}</div>
                {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Дата <span class="text-danger">*</span></label>
                        <input type="date" name="date" class="form-control"
                               value="{{ record.date|date:'Y-m-d' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Статус <span class="text-danger">*</span></label>
                        <select name="status" class="form-select" required>
                            <option value="">Выберите...</option>
                            {% for s in statuses %}
                            <option value="{{ s.id }}" {% if record.status_id == s.id %}selected{% endif %}>
                                {{ s.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Тип <span class="text-danger">*</span></label>
                        <select id="typeSelect" class="form-select" required>
                            <option value="">Выберите...</option>
                            {% for t in types %}
                            <option value="{{ t.id }}"
                                {% if record.sub_category.category.transaction_type_id == t.id %}selected{% endif %}>
                                {{ t.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Категория <span class="text-danger">*</span></label>
                        <select id="catSelect" class="form-select" required>
                            <option value="{{ record.sub_category.category.id }}" selected>
                                {{ record.sub_category.category.name }}
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Подкатегория <span class="text-danger">*</span></label>
                        <select name="sub_category" id="subCatSelect" class="form-select" required>
                            <option value="{{ record.sub_category.id }}" selected>
                                {{ record.sub_category.name }}
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Сумма, р. <span class="text-danger">*</span></label>
                        <input type="number" name="amount" class="form-control"
                               value="{{ record.amount }}" required min="0" step="0.01">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Комментарий</label>
                        <input type="text" name="comment" class="form-control"
                               value="{{ record.comment|default:'' }}">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Сохранить</button>
                        <a href="{% url 'index' %}" class="btn btn-outline-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const currentTypeId = "{{ record.sub_category.category.transaction_type_id }}";
    const currentCatId = "{{ record.sub_category.category_id }}";
    const currentSubCatId = "{{ record.sub_category_id }}";

    const typeSelect = document.getElementById('typeSelect');
    const catSelect = document.getElementById('catSelect');
    const subCatSelect = document.getElementById('subCatSelect');

    async function loadCategories(typeId, selectedCatId) {
        const data = await (await fetch(`/api/categories/?type_id=${typeId}`)).json();
        catSelect.innerHTML = '<option value="">Выберите категорию...</option>' +
            data.map(c => `<option value="${c.id}" ${c.id == selectedCatId ? 'selected' : ''}>${c.name}</option>`).join('');
    }

    async function loadSubcategories(catId, selectedSubId) {
        const data = await (await fetch(`/api/subcategories/?category_id=${catId}`)).json();
        subCatSelect.innerHTML = '<option value="">Выберите подкатегорию...</option>' +
            data.map(s => `<option value="${s.id}" ${s.id == selectedSubId ? 'selected' : ''}>${s.name}</option>`).join('');
    }

    // При загрузке восстанавливаем текущие значения
    window.addEventListener('DOMContentLoaded', async () => {
        if (currentTypeId) {
            await loadCategories(currentTypeId, currentCatId);
            if (currentCatId) {
                await loadSubcategories(currentCatId, currentSubCatId);
            }
        }
    });

    typeSelect.onchange = async (e) => {
        catSelect.innerHTML = '<option value="">Выберите категорию...</option>';
        subCatSelect.innerHTML = '<option value="">Выберите подкатегорию...</option>';
        if (!e.target.value) return;
        await loadCategories(e.target.value, null);
    };

    catSelect.onchange = async (e) => {
        subCatSelect.innerHTML = '<option value="">Выберите подкатегорию...</option>';
        if (!e.target.value) return;
        await loadSubcategories(e.target.value, null);
    };
</script>
</body>
</html>
